<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2C90DE">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>記帳</title>
<style>
  :root{
    /* 主題配色取自 App icon：藍 + 青綠 + 金黃，白底 */
    --bg:#eef3f8;--card:#ffffff;--card2:#edf2f8;--line:#dde6ef;
    --txt:#10212f;--sub:#6c7c8d;--accent:#2C90DE;--accent2:#14B8AD;
    --teal:#14B8AD;--green:#13b39e;--red:#ef4f4f;--amber:#F2A516;--gold:#FBB627;--alt:#14B8AD;--jpy:#14B8AD;--radius:16px;
    --grad:linear-gradient(120deg,#2C90DE 0%,#19B5C2 55%,#16C2B6 100%);
    --shadow:0 1px 3px rgba(16,33,47,.07),0 1px 2px rgba(16,33,47,.04);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;font-size:16px;line-height:1.4;}
  body{padding-bottom:92px;}
  .wrap{max-width:560px;margin:0 auto;padding:0 14px;}
  header{position:sticky;top:0;z-index:30;background:var(--grad);box-shadow:0 2px 10px rgba(16,33,47,.16);}
  header .wrap{display:flex;align-items:center;justify-content:space-between;height:56px;}
  header h1{font-size:18px;margin:0;font-weight:800;color:#fff;letter-spacing:.5px;}
  header .rate{font-size:11px;color:rgba(255,255,255,.82);text-align:right;line-height:1.3;}
  /* 旅程切換列 */
  .tripbar-wrap{position:relative;z-index:1;background:var(--card);border-bottom:1px solid var(--line);}
  .tripbar{display:flex;gap:7px;overflow-x:auto;padding:10px 14px;max-width:560px;margin:0 auto;-webkit-overflow-scrolling:touch;}
  .tripbar::-webkit-scrollbar{display:none;}
  .tchip{flex:0 0 auto;background:var(--card2);border:1px solid var(--line);color:var(--sub);
    border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;font-weight:600;}
  .tchip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tchip.trip.on{background:var(--alt);border-color:var(--alt);}
  .tchip.add{color:var(--accent);border-style:dashed;background:#fff;}
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--card);border-top:1px solid var(--line);display:flex;box-shadow:0 -1px 6px rgba(10,22,51,.05);}
  .tabbar button{flex:1;background:none;border:none;color:var(--sub);padding:9px 0 calc(9px + env(safe-area-inset-bottom));font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
  .tabbar button .ic{font-size:19px;line-height:1;}
  .tabbar button.on{color:var(--accent);font-weight:700;}
  section.page{display:none;padding-top:14px;}
  section.page.on{display:block;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:var(--shadow);}
  label.fl{display:block;font-size:13px;color:var(--sub);margin:0 0 6px;font-weight:600;}
  input[type=text],input[type=number],input[type=url],input[type=date],textarea,select{
    width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:12px;font-size:16px;font-family:inherit;}
  textarea{resize:vertical;min-height:42px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(44,144,222,.12);}
  .row{margin-bottom:12px;}.row:last-child{margin-bottom:0;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .grid2>div{min-width:0;}
  input[type=date]{min-width:0;}
  .seg{display:flex;flex-wrap:wrap;gap:6px;}
  .seg button{flex:1;min-width:auto;background:var(--card2);border:1px solid var(--line);color:var(--sub);border-radius:10px;padding:11px 6px;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .seg.wrapy button{flex:0 1 auto;min-width:calc(33.33% - 4px);}
  .seg.day button{flex:0 1 auto;min-width:calc(25% - 5px);}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .amt-field{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:16px 14px;cursor:pointer;min-height:58px;}
  .amt-field.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(44,144,222,.12);}
  .amt-field .cur-sym{font-size:20px;color:var(--accent);font-weight:800;}
  .amt-field .amt-disp{font-size:26px;font-weight:800;color:var(--txt);flex:1;word-break:break-all;}
  .amt-field .amt-ph{font-size:16px;color:var(--sub);flex:1;}
  .amt-field.has-val .amt-ph{display:none;}.amt-field:not(.has-val) .amt-disp{display:none;}
  .amt-calc{font-size:13px;color:var(--accent);font-weight:600;margin-top:6px;min-height:18px;}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .thumbs .th{position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:var(--card2);}
  .thumbs .th img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumbs .th .x{position:absolute;top:-1px;right:-1px;width:20px;height:20px;background:rgba(10,22,51,.7);color:#fff;border:none;border-radius:0 0 0 8px;font-size:13px;line-height:20px;cursor:pointer;padding:0;}
  .item .rcpts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .item .rcpts a{display:block;width:48px;height:48px;border-radius:6px;overflow:hidden;border:1px solid var(--line);background:var(--card2);}
  .item .rcpts a img{width:100%;height:100%;object-fit:cover;}
  .item .rcpts a.fallback{display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none;color:var(--accent);}
  .dqrow{display:flex;gap:7px;margin-top:8px;}
  .dqrow button{flex:0 0 auto;background:var(--card2);border:1px solid var(--line);color:var(--accent);border-radius:16px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .dqrow button.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .quick-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
  .quick-chips button{background:rgba(44,144,222,.06);border:1px solid rgba(44,144,222,.18);color:var(--accent);border-radius:18px;padding:7px 13px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;}
  .btn{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:15px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;box-shadow:0 2px 8px rgba(44,144,222,.25);}
  .btn:active{opacity:.9;transform:translateY(1px);}
  .btn.sec{background:var(--card2);border:1px solid var(--line);color:var(--txt);font-size:15px;padding:12px;font-weight:600;box-shadow:none;}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--sub);box-shadow:none;}
  .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .stat .k{font-size:12px;color:var(--sub);}
  .stat .v{font-size:21px;font-weight:800;margin-top:3px;}
  .stat.wide{grid-column:1/3;background:var(--accent);border-color:var(--accent);}
  .stat.wide .k{color:rgba(255,255,255,.8);}
  .stat.wide .v{color:#fff;}
  .settle{font-size:15px;line-height:1.6;}
  .settle .big{font-size:22px;font-weight:800;color:var(--accent);}
  .settle.even .big{color:var(--green);}
  .scope-tag{font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;display:inline-block;margin-bottom:10px;}
  .scope-tag.home{background:#e6f4ec;color:#0c7a44;border:1px solid #bfe3cd;}
  .scope-tag.trip{background:#e4ebfc;color:var(--accent);border:1px solid #bfdcf5;}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;font-size:14px;}
  .switch{position:relative;width:48px;height:28px;flex:0 0 auto;}
  .switch input{display:none;}
  .switch .sl{position:absolute;inset:0;background:#cfd6e6;border:1px solid var(--line);border-radius:20px;transition:.2s;}
  .switch .sl:before{content:"";position:absolute;width:22px;height:22px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .switch input:checked + .sl{background:var(--accent);border-color:var(--accent);}
  .switch input:checked + .sl:before{transform:translateX(20px);background:#fff;}
  .cat-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px;}
  .cat-row:last-child{border-bottom:none;}
  .cat-row .pct{color:var(--sub);font-size:12px;margin-left:8px;}
  .cat-row .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;vertical-align:middle;}
  .cat-pie{display:flex;justify-content:center;margin-bottom:6px;}
  .mrow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px;}
  .mrow:last-child{border-bottom:none;}
  .item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow);}
  .item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .item .nm{font-weight:600;font-size:15px;}
  .item .amt{font-weight:800;font-size:15px;text-align:right;white-space:nowrap;color:var(--txt);}
  .item .amt small{display:block;font-size:11px;color:var(--sub);font-weight:400;}
  .item .meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .chip{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--card2);border:1px solid var(--line);color:var(--sub);}
  .chip.self{color:var(--amber);border-color:#ecdcb3;background:#fbf4e2;}
  .chip.shared{color:var(--accent2);border-color:#bfdcf5;background:#e7f2fb;}
  .chip.day{color:var(--accent);border-color:#bfdcf5;background:#e7f2fb;font-weight:600;}
  .item .act{display:flex;gap:8px;margin-top:9px;}
  .item .act button{flex:1;background:none;border:1px solid var(--line);color:var(--sub);border-radius:8px;padding:7px;font-size:13px;cursor:pointer;font-family:inherit;}
  .item .act button.del{color:var(--red);border-color:#f3c6c8;}
  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;-webkit-overflow-scrolling:touch;}
  .filters select{width:auto;flex:0 0 auto;padding:8px 10px;font-size:14px;}
  .date-filter-bar{display:flex;align-items:center;justify-content:space-between;background:#e7f2fb;border:1px solid var(--accent);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:14px;color:var(--accent);font-weight:600;}
  .date-filter-bar button{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;font-family:inherit;font-weight:700;}
  .empty{text-align:center;color:var(--sub);padding:40px 20px;font-size:14px;}
  .muted{color:var(--sub);font-size:13px;}
  .small-note{font-size:12px;color:var(--sub);margin-top:8px;line-height:1.5;}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#10212f;color:#fff;padding:11px 20px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:100;max-width:90%;box-shadow:0 6px 20px rgba(10,22,51,.3);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0;}
  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-title{font-size:18px;font-weight:800;}
  .cal-nav{background:var(--card2);border:1px solid var(--line);color:var(--accent);width:40px;height:40px;border-radius:10px;font-size:22px;cursor:pointer;font-family:inherit;line-height:1;font-weight:700;}
  .cal-week{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;color:var(--sub);margin-bottom:6px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-cell{min-height:50px;border-radius:8px;padding:4px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:13px;border:1px solid transparent;}
  .cal-cell .cd{color:var(--sub);font-size:12px;}
  .cal-cell.has{background:#e7f2fb;border-color:#cfe6f8;cursor:pointer;}
  .cal-cell.has .cd{color:var(--txt);font-weight:600;}
  .cal-cell .ca{font-size:10px;color:var(--accent);font-weight:700;line-height:1.1;text-align:center;}
  .cal-cell.today{border-color:var(--accent);background:#d4eaf9;}
  .cal-cell.today .cd{color:var(--accent);font-weight:800;}
  .cal-total{text-align:right;font-size:15px;font-weight:800;margin-top:12px;padding-top:10px;border-top:1px solid var(--line);}
  .bud-line{display:flex;justify-content:space-between;font-size:14px;margin-bottom:7px;}
  .bud-bar{height:12px;background:var(--card2);border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  .bud-fill{height:100%;background:var(--accent);transition:width .3s;}
  .bud-fill.warn{background:var(--amber);}.bud-fill.over{background:var(--red);}
  .bud-sub{font-size:13px;color:var(--sub);margin-top:8px;}
  /* trip list in settings */
  .triprow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
  .triprow:last-child{border-bottom:none;}
  .triprow .tl{font-size:15px;font-weight:700;}
  .triprow .ts{font-size:12px;color:var(--sub);margin-top:2px;}
  .triprow .tb{display:flex;gap:6px;}
  .triprow .tb button{background:var(--card2);border:1px solid var(--line);color:var(--sub);border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;font-family:inherit;}
  .triprow .tb button.del{color:var(--red);border-color:#f3c6c8;}
  /* month head + split bar (明細/結算) */
  .month-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .month-total{display:flex;align-items:baseline;justify-content:space-between;font-size:14px;color:var(--sub);margin-bottom:10px;}
  .month-total b{font-size:22px;color:var(--txt);font-weight:800;}
  .split-bar{display:flex;height:12px;border-radius:8px;overflow:hidden;background:var(--card2);border:1px solid var(--line);}
  .split-bar.big{height:16px;}
  .split-bar .seg-shared{background:var(--accent);}
  .split-bar .seg-self{background:var(--amber);}
  .split-legend{display:flex;gap:16px;margin-top:9px;font-size:13px;color:var(--sub);}
  .split-legend b{color:var(--txt);}
  .split-legend .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle;}
  .split-legend .dot.shared{background:var(--accent);}
  .split-legend .dot.self{background:var(--amber);}
  /* transaction rows grouped by date */
  .day-head{display:flex;align-items:baseline;justify-content:space-between;margin:14px 2px 7px;font-size:13px;color:var(--sub);font-weight:600;}
  .day-head b{color:var(--txt);font-weight:700;}
  .tx{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;}
  .tx:active{background:#f1f7fc;}
  .tx-ico{flex:0 0 auto;width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;}
  .tx-mid{flex:1;min-width:0;}
  .tx-nm{font-weight:600;font-size:15px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .tx-sub{font-size:12px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx-amt{flex:0 0 auto;text-align:right;font-weight:800;font-size:15px;color:var(--txt);white-space:nowrap;}
  .tx-amt small{display:block;font-size:11px;color:var(--sub);font-weight:400;}
  .tag-kind{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
  .tag-kind.shared{color:var(--accent);background:#e7f2fb;border:1px solid #bfdcf5;}
  .tag-kind.self{color:var(--amber);background:#fbf4e2;border:1px solid #ecdcb3;}
  .burden-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
  .burden-row:last-child{border-bottom:none;}
  .burden-row .bname{font-size:16px;font-weight:700;}
  .burden-row .bsub{font-size:12px;color:var(--sub);margin-top:2px;}
  .burden-row .bamt{font-size:22px;font-weight:800;color:var(--accent);white-space:nowrap;}
  .settle .arrow{font-size:20px;font-weight:800;color:var(--accent);}
  /* keypad */
  .kp-backdrop{position:fixed;inset:0;background:rgba(10,22,51,.35);z-index:55;opacity:0;pointer-events:none;transition:.2s;}
  .kp-backdrop.show{opacity:1;pointer-events:auto;}
  .keypad{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--card);border-top:1px solid var(--line);border-radius:20px 20px 0 0;padding:12px 10px calc(12px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .25s cubic-bezier(.2,.8,.2,1);max-width:560px;margin:0 auto;box-shadow:0 -8px 30px rgba(10,22,51,.18);}
  .keypad.show{transform:translateY(0);}
  .kp-head{display:flex;align-items:baseline;justify-content:space-between;padding:6px 8px 12px;gap:10px;}
  .kp-expr-txt{font-size:28px;font-weight:800;word-break:break-all;color:var(--txt);}
  .kp-prev{font-size:14px;color:var(--accent);font-weight:600;white-space:nowrap;}
  .kp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .kp-key{background:var(--card2);border:1px solid var(--line);color:var(--txt);font-size:23px;font-weight:700;border-radius:12px;padding:16px 0;cursor:pointer;font-family:inherit;user-select:none;}
  .kp-key:active{background:#dfe6f5;}.kp-key.op{color:var(--accent);font-weight:800;}
  .kp-foot{display:flex;gap:8px;margin-top:8px;}
  .kp-clear{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--sub);font-size:16px;font-weight:600;border-radius:12px;padding:15px;cursor:pointer;font-family:inherit;}
  .kp-done{flex:2;background:var(--accent);border:none;color:#fff;font-size:18px;font-weight:700;border-radius:12px;padding:15px;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(44,144,222,.25);}
  /* modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(10,22,51,.4);z-index:65;opacity:0;pointer-events:none;transition:.2s;}
  .modal-backdrop.show{opacity:1;pointer-events:auto;}
  .modal{position:fixed;left:0;right:0;bottom:0;z-index:70;background:var(--card);border-top:1px solid var(--line);border-radius:20px 20px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .25s cubic-bezier(.2,.8,.2,1);max-width:560px;margin:0 auto;box-shadow:0 -8px 30px rgba(10,22,51,.2);max-height:88vh;overflow-y:auto;}
  .modal.show{transform:translateY(0);}
  .modal h3{margin:0 0 14px;font-size:18px;color:var(--accent);}
</style>
</head>
<body>

<header><div class="wrap">
  <h1>💰 記帳</h1>
  <span class="rate" id="rateLabel"></span>
</div></header>

<!-- 旅程切換列 -->
<div class="tripbar-wrap"><div class="tripbar" id="tripBar"></div></div>

<div class="wrap">

<!-- 記帳 -->
<section class="page on" id="page-add">
  <div class="card">
    <div class="row">
      <label class="fl">項目</label>
      <input type="text" id="f-item" placeholder="例如：午餐、咖啡、交通" autocomplete="off">
      <div class="quick-chips" id="quickChips"></div>
    </div>
    <div class="row">
      <label class="fl">金額（點一下用計算機，可加減乘除）</label>
      <div class="amt-field" id="f-amountField" tabindex="0">
        <span class="cur-sym" id="amtCurSym"></span>
        <span class="amt-disp" id="amtDisp"></span>
        <span class="amt-ph">點這裡輸入金額</span>
      </div>
      <input type="hidden" id="f-amount" value="">
      <div class="amt-calc" id="amtCalc"></div>
    </div>

<script>
"use strict";
/* ---------- data layer: Apps Script if available, else localStorage ---------- */
/* API 網址存在這台裝置（不寫死在程式裡，公開原始碼就不會洩漏你的網址） */
var API_URL = localStorage.getItem("genledger_apiurl") || "";
var USE_GAS = !!API_URL;
function apiCall(action,payload,usePost){
  if(usePost){
    return fetch(API_URL,{method:"POST",body:JSON.stringify({action:action,payload:payload})}).then(function(r){return r.json();});
  }
  var u=API_URL+(API_URL.indexOf("?")<0?"?":"&")+"action="+encodeURIComponent(action)+"&t="+Date.now();
  if(payload!=null&&payload!==undefined)u+="&payload="+encodeURIComponent(JSON.stringify(payload));
  return fetch(u,{cache:"no-store"}).then(function(r){return r.json();});
}
function gas(fn,arg){
  if(!USE_GAS)return Promise.resolve(localGas(fn,arg));
  var p=(fn==="uploadReceipt")?apiCall(fn,arg,true):apiCall(fn,arg,false);
  return p.then(function(j){
    if(j&&j.error)throw new Error(j.error);
    if(fn==="getData")return j;
    return (j&&("result" in j))?j.result:j;
  });
}
function localGas(fn,arg){
  var IT="genledger_items",CF="genledger_cfg";
  var items=JSON.parse(localStorage.getItem(IT)||"[]");
  if(fn==="getData")return {items:items,config:JSON.parse(localStorage.getItem(CF)||"{}")};
  if(fn==="addEntry"){items.push(arg);localStorage.setItem(IT,JSON.stringify(items));return true;}
  if(fn==="updateEntry"){var i=items.findIndex(function(x){return x.id===arg.id;});if(i>=0)items[i]=arg;localStorage.setItem(IT,JSON.stringify(items));return true;}
  if(fn==="deleteEntry"){items=items.filter(function(x){return x.id!==arg;});localStorage.setItem(IT,JSON.stringify(items));return true;}
  if(fn==="saveConfig"){localStorage.setItem(CF,JSON.stringify(arg));return true;}
  if(fn==="uploadReceipt"){return {id:"local",url:"data:"+(arg.mime||"image/jpeg")+";base64,"+arg.dataBase64};}
}

/* ---------- defaults / state ---------- */
var DEF={
  people:["Q","J"], base:"TWD", currencies:["TWD","JPY"],
  categories:["餐飲","交通","購物","娛樂","住宿","生活","其他"],
  methods:["現金","信用卡","行動支付","其他"],
  manualRates:{JPY:0.21}, budgetTotal:0, budgetDaily:0,
  quickItems:["早餐,餐飲","午餐,餐飲","晚餐,餐飲","手搖飲,餐飲","咖啡,餐飲","uber,交通","儲值,交通","全聯,生活","日用品,生活"],
  drive:"", trips:[]
};
var cfg=JSON.parse(JSON.stringify(DEF));
var state={items:[], editId:null};
var rateMap={}, rateTime=0, rateOK=false;
var RATE_API="https://open.er-api.com/v6/latest/";
var includePersonal=false, lmY=null, lmM=null;
var pendingPhotos=[], formReceipts=[], saving=false;
var activeTrip=localStorage.getItem("genledger_activeTrip")||"";  /* ""=日常 */
var tripEditId=null;
var SYM={TWD:"NT$",JPY:"¥",USD:"$",EUR:"€",KRW:"₩",CNY:"¥",HKD:"HK$",THB:"฿",GBP:"£",SGD:"S$",AUD:"A$",VND:"₫",MYR:"RM"};
/* 類別配色（白底克萊因藍系，第一色為 IKB） */
var PALETTE=["#2C90DE","#14B8AD","#FBB627","#7048E8","#EF6C8B","#19B5C2","#F2784B","#5B8DEF","#E0A92B","#8FA1B3"];
/* 類別圖示（天天記帳風格，找不到就不顯示） */
var CAT_ICON={"餐飲":"🍜","飲食":"🍜","早餐":"🥐","午餐":"🍱","晚餐":"🍚","咖啡":"☕","飲料":"🧋","零食":"🍪",
  "交通":"🚇","油錢":"⛽","停車":"🅿️","購物":"🛍️","日用品":"🧴","生活":"🧴","娛樂":"🎮","旅遊":"✈️","住宿":"🏨",
  "醫療":"💊","保健":"💊","教育":"📚","學習":"📖","訂閱":"📺","通訊":"📱","水電":"💡","房租":"🏠","房貸":"🏠",
  "寵物":"🐾","美容":"💅","美妝":"💄","服飾":"👗","運動":"🏃","健身":"🏋️","禮物":"🎁","紅包":"🧧","孝親":"👵",
  "保險":"🛡️","稅金":"🧾","投資":"📈","捐款":"🤝","菸酒":"🍷","3C":"💻","家居":"🛋️","其他":"📦"};
function catIcon(c){return CAT_ICON[c]||"";}

/* ---------- helpers ---------- */
function $(id){return document.getElementById(id);}
function pad(n){return (n<10?"0":"")+n;}
function ymd(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
/* 把雲端可能回傳的各種日期格式（ISO 帶時間、Date…）統一成 本地 年-月-日，月曆才對得上 */
function normDate(v){
  if(v==null)return "";
  v=""+v;
  if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;           /* 已經是乾淨格式 */
  var d=new Date(v);
  if(!isNaN(d.getTime()))return ymd(d);                 /* ISO/含時間 → 本地年月日 */
  return v;
}
function shiftYmd(off){var d=new Date();d.setDate(d.getDate()+(+off||0));return ymd(d);}
function syncDateQuick(){var bs=$("dateQuick").querySelectorAll("button"),v=$("f-date").value;for(var i=0;i<bs.length;i++)bs[i].classList.toggle("on",shiftYmd(+bs[i].getAttribute("data-d"))===v);}
function sym(c){return SYM[c]||(c+" ");}
function money(n){return sym(cfg.base)+Math.round(n).toLocaleString("en-US");}
function ntShort(n){n=Math.round(n);if(n>=100000)return Math.round(n/1000)+"k";if(n>=10000)return (n/1000).toFixed(1)+"k";return n.toLocaleString("en-US");}
function esc(s){return (""+s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function toast(m){var t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},1900);}
function catColor(c){var i=cfg.categories.indexOf(c);return PALETTE[(i<0?9:i)%PALETTE.length];}
function evalAmount(str){var s=(""+str).replace(/[，,]/g,"").replace(/\s+/g,"");if(s==="")return null;if(!/^[0-9+\-*/.()]+$/.test(s))return null;try{var v=Function('"use strict";return ('+s+')')();if(typeof v!=="number"||!isFinite(v))return null;return v;}catch(e){return null;}}
/* 去掉算式尾端還沒打完的運算子或小數點，例如 "500+"、"500." → "500"（計算機式容錯） */
function cleanExpr(s){return (""+s).replace(/[+\-*/.]+$/,"");}

/* base per 1 unit of currency c */
function rateFor(c){if(c===cfg.base)return 1;if(rateOK&&rateMap[c])return rateMap[c];if(cfg.manualRates&&cfg.manualRates[c])return +cfg.manualRates[c];return 1;}

/* ---------- trips / scope ---------- */
function tripById(id){return (cfg.trips||[]).find(function(t){return t.id===id;});}
function activeTripObj(){return activeTrip?tripById(activeTrip):null;}
function inScope(r){return (r.trip||"")===(activeTrip||"");}
function scopedItems(){return state.items.filter(inScope);}
function tripDays(t){
  if(t&&t.start&&t.end){var a=new Date(t.start+"T00:00:00"),b=new Date(t.end+"T00:00:00");var n=Math.round((b-a)/86400000)+1;if(n>0&&n<=90)return n;}
  return 10;
}
function autoDay(dateStr,t){
  if(!t||!t.start||!dateStr)return null;
  var a=new Date(t.start+"T00:00:00"),b=new Date(dateStr+"T00:00:00");
  var diff=Math.round((b-a)/86400000), n=tripDays(t);
  if(diff>=0&&diff<n)return "Day"+(diff+1);
  return "全程";
}
function dayValues(t){var n=tripDays(t),v=[];for(var i=1;i<=n;i++)v.push("Day"+i);v.push("全程");return v;}

function renderTripBar(){
  var bar=$("tripBar");
  var html="<button class='tchip"+(activeTrip===""?" on":"")+"' data-t=''>🏠 日常</button>";
  (cfg.trips||[]).forEach(function(t){
    html+="<button class='tchip trip"+(activeTrip===t.id?" on":"")+"' data-t='"+esc(t.id)+"'>✈️ "+esc(t.name)+"</button>";
  });
  html+="<button class='tchip add' data-add='1'>＋ 旅程</button>";
  bar.innerHTML=html;
}
function setActiveTrip(id){
  activeTrip=id||"";
  localStorage.setItem("genledger_activeTrip",activeTrip);
  renderTripBar();updateModeUI();clearForm();renderAll();
}
function updateModeUI(){
  var t=activeTripObj();
  $("dayRow").style.display=t?"block":"none";
  $("flt-day").style.display=t?"block":"none";
  $("kindLabel").textContent=t?"分帳":"屬於";
}

/* ---------- segmented controls ---------- */
function renderSeg(id,values,current){
  var el=$(id);
  el.innerHTML=values.map(function(v){return "<button data-v='"+esc(v)+"'"+(v===current?" class='on'":"")+">"+esc(v)+"</button>";}).join("");
}
function segValue(id){var b=$(id).querySelector("button.on");return b?b.getAttribute("data-v"):null;}
function setSeg(id,val){var bs=$(id).querySelectorAll("button");for(var i=0;i<bs.length;i++)bs[i].classList.toggle("on",bs[i].getAttribute("data-v")===val);if(!$(id).querySelector("button.on")&&bs[0])bs[0].classList.add("on");}
function bindSeg(id,cb){$(id).addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;var bs=$(id).querySelectorAll("button");for(var i=0;i<bs.length;i++)bs[i].classList.remove("on");b.classList.add("on");if(cb)cb();});}

function renderCatSeg(current){
  $("seg-cat").innerHTML=cfg.categories.map(function(v){var ic=catIcon(v);
    return "<button data-v='"+esc(v)+"'"+(v===current?" class='on'":"")+">"+(ic?ic+" ":"")+esc(v)+"</button>";}).join("");
}
function renderFormSegs(){
  renderSeg("seg-cur",cfg.currencies,cfg.currencies[0]);

function prettyExpr(s){return (""+s).replace(/\*/g,"×").replace(/\//g,"÷");}
function updateAmtCalc(){
  var raw=$("f-amount").value, cur=segValue("seg-cur")||cfg.currencies[0];
  $("amtCurSym").textContent=sym(cur);
  var fld=$("f-amountField");
  if(raw){fld.classList.add("has-val");$("amtDisp").textContent=prettyExpr(raw);}else{fld.classList.remove("has-val");$("amtDisp").textContent="";}
  if($("kpExpr"))$("kpExpr").textContent=raw?prettyExpr(raw):"0";
  var v=evalAmount(raw), box=$("amtCalc"), prev=$("kpPrev");
  if(v==null&&raw)v=evalAmount(cleanExpr(raw));  /* 打到一半的運算子先忽略，不要嚇人 */
  if(v==null){box.textContent=(raw&&cleanExpr(raw))?"⚠️ 算式看不懂":"";box.style.color="var(--red)";if(prev)prev.textContent="";return;}
  box.style.color="var(--accent)";
  var base=v*rateFor(cur);
  box.textContent=(cur===cfg.base)?("= "+money(v)):("= "+sym(cur)+Math.round(v).toLocaleString("en-US")+"　≈ "+money(base));
  if(prev)prev.textContent=(cur===cfg.base)?money(v):"≈ "+money(base);
}
function openKeypad(){$("keypad").classList.add("show");$("kpBackdrop").classList.add("show");$("f-amountField").classList.add("active");updateAmtCalc();}
function closeKeypad(){$("keypad").classList.remove("show");$("kpBackdrop").classList.remove("show");$("f-amountField").classList.remove("active");}
function keyPress(k){
  var inp=$("f-amount"),v=inp.value,map={"×":"*","÷":"/","-":"-","+":"+"};
  if(k==="C"){inp.value="";updateAmtCalc();return;}
  if(k==="DEL"){inp.value=v.slice(0,-1);updateAmtCalc();return;}
  if(k==="DONE"){var c=cleanExpr(v),r=evalAmount(c);if(c&&r==null){toast("算式有誤");return;}if(r!=null)inp.value=String(Math.round(r*100)/100);updateAmtCalc();closeKeypad();return;}
  if(k in map){var op=map[k];if(v===""){if(k==="-"){inp.value="-";updateAmtCalc();}return;}var last=v.slice(-1);if("+-*/".indexOf(last)>=0)v=v.slice(0,-1);inp.value=v+op;}
  else if(k==="."){var seg=v.split(/[+\-*/]/).pop();if(seg.indexOf(".")>=0)return;inp.value=(v===""?"0":v)+".";}
  else{inp.value=v+k;}
  updateAmtCalc();
}

/* ---------- 收據照片 ---------- */
function readResize(file){
  return new Promise(function(res){
    var fr=new FileReader();
    fr.onload=function(){
      var img=new Image();
      img.onload=function(){
        var max=1280,w=img.width,h=img.height;
        if(w>max||h>max){if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
        var cv=document.createElement("canvas");cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        var url=cv.toDataURL("image/jpeg",0.8);
        res({name:(file.name||"receipt")+".jpg",mime:"image/jpeg",dataBase64:url.split(",")[1],previewUrl:url});
      };
      img.onerror=function(){res(null);};
      img.src=fr.result;
    };
    fr.onerror=function(){res(null);};
    fr.readAsDataURL(file);
  });
}
function receiptName(rec,idx){
  var safe=function(s){return (""+s).replace(/[\\/:*?"<>|.]/g,"").replace(/\s+/g,"").slice(0,16);};
  return rec.date+"_"+safe(rec.item)+"_"+Math.round(rec.amount)+rec.currency+"_"+safe(rec.payer)+"_"+(""+rec.id).slice(-4)+(idx?("-"+(idx+1)):"")+".jpg";
}

  if(room<=0){toast("最多 5 張");return;}
  var list=Array.prototype.slice.call(files,0,room);
  Promise.all(list.map(readResize)).then(function(arr){
    arr.forEach(function(p){if(p)pendingPhotos.push(p);});
    renderThumbs();
  });
}

    html+="<div class='th'><img src='"+src+"' onerror=\"this.src='';this.parentNode.style.background='#f1f4fb';\"><button class='x' onclick='rmReceipt("+i+")'>✕</button></div>";

function inSplit(r){return r.kind==="公用"||(includePersonal&&r.kind==="自己");}
function burdenRow(name,burden,own,per,inc){
  var sub=inc?"全部均分":("自己 "+money(own)+" ＋ 公用分攤 "+money(per));
  return "<div class='burden-row'><div><div class='bname'>"+esc(name)+"</div><div class='bsub'>"+sub+"</div></div><div class='bamt'>"+money(burden)+"</div></div>";
}
function renderSummary(){
  scopeTagHTML($("sumScope"));
  var A=cfg.people[0], B=cfg.people[1];
  var total=0,shared=0,self=0,selfA=0,selfB=0,paidA=0,paidB=0;
  scopedItems().forEach(function(r){
    total+=r.base;
    if(r.kind==="自己"){self+=r.base;if(r.payer===A)selfA+=r.base;else if(r.payer===B)selfB+=r.base;}
    else shared+=r.base;
    if(r.payer===A)paidA+=r.base;else if(r.payer===B)paidB+=r.base;  /* 已付：全部（含自己＋公用） */
  });
  /* 上方總覽分條 */
  $("s-total").textContent=money(total);
  $("s-sharedTotal").textContent=money(shared);$("s-selfTotal").textContent=money(self);
  var tt=(shared+self)||1;
  $("s-barShared").style.width=(shared/tt*100).toFixed(1)+"%";
  $("s-barSelf").style.width=(self/tt*100).toFixed(1)+"%";

  /* 實際負擔：自己的自付 ＋ 公用平分；開關打開＝全部均分 */
  var pool=shared+(includePersonal?self:0), per=pool/2;
  var ownA=includePersonal?0:selfA, ownB=includePersonal?0:selfB;
  var burdenA=ownA+per, burdenB=ownB+per;
  $("burdenBox").innerHTML=burdenRow(A,burdenA,ownA,per,includePersonal)+burdenRow(B,burdenB,ownB,per,includePersonal);

  /* 結算：已付 vs 應負擔 */
  var box=$("settleBox"), hint=$("settleHint");
  if(total<=0){box.className="settle";box.innerHTML="這個範圍還沒有資料";hint.innerHTML="";return;}
  var balA=Math.round(paidA-burdenA), diff=Math.abs(balA);
  if(diff===0){box.className="settle even";box.innerHTML="🎉 剛好打平，<span class='big'>不用補款</span>";}
  else{var ower=balA<0?A:B, owee=balA<0?B:A;box.className="settle";box.innerHTML="<span class='arrow'>"+esc(ower)+" → "+esc(owee)+"</span>　<span class='big'>"+money(diff)+"</span>";}
  hint.innerHTML="已付："+esc(A)+" "+money(paidA)+" · "+esc(B)+" "+money(paidB)+"。"+(includePersonal?"（所有花費兩人均分）":"（公用平分、自己各付各的）");
}

function pieSVG(slices,total){
  if(!total)return "";
  var cx=80,cy=80,r=72,a=-Math.PI/2,p="";
  slices.forEach(function(s){var f=s.value/total,a2=a+f*2*Math.PI;
    if(f>=0.9999){p+="<circle cx='"+cx+"' cy='"+cy+"' r='"+r+"' fill='"+s.color+"'/>";}
    else{var x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2),lg=f>0.5?1:0;
      p+="<path d='M"+cx+","+cy+" L"+x1.toFixed(2)+","+y1.toFixed(2)+" A"+r+","+r+" 0 "+lg+" 1 "+x2.toFixed(2)+","+y2.toFixed(2)+" Z' fill='"+s.color+"'/>";}
    a=a2;});
  p+="<circle cx='"+cx+"' cy='"+cy+"' r='42' fill='#ffffff'/>";
  p+="<text x='80' y='75' text-anchor='middle' fill='#6c7c8d' font-size='11'>合計</text>";
  p+="<text x='80' y='93' text-anchor='middle' fill='#10212f' font-size='15' font-weight='700'>"+ntShort(total)+"</text>";
  return "<svg viewBox='0 0 160 160' width='168' height='168'>"+p+"</svg>";
}

    var d=new Date(r.ts),ts=d.getFullYear()+"/"+(d.getMonth()+1)+"/"+d.getDate()+" "+pad(d.getHours())+":"+pad(d.getMinutes());
    var tn=r.trip?((tripById(r.trip)||{}).name||r.trip):"日常";
    return [(r.date||"").replace(/-/g,"/"),tn,r.day||"",r.item,r.amount,r.currency,Math.round(r.base),r.rateUsed,r.payer,r.method,r.category,r.kind,r.note||"",ts];
  });
}
function cols(){return ["日期","旅程","Day","項目","金額","幣別",cfg.base+"金額","匯率","付款人","付款方式","類別","公用/自己","備註","建立時間"];}
function copyTSV(){
  if(!scopedItems().length){toast("此範圍沒有資料");return;}
  var txt=[cols().join("\t")].concat(rowsForExport().map(function(r){return r.join("\t");})).join("\n");
  navigator.clipboard.writeText(txt).then(function(){toast("已複製 ✓ 貼進試算表即可");}).catch(function(){var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("已複製 ✓");}catch(e){toast("複製失敗");}document.body.removeChild(ta);});
}
function downloadCSV(){
  if(!scopedItems().length){toast("此範圍沒有資料");return;}
  var q=function(v){v=""+v;return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  var csv="﻿"+[cols().map(q).join(",")].concat(rowsForExport().map(function(r){return r.map(q).join(",");})).join("\r\n");
  var t=activeTripObj(),fn="記帳_"+(t?t.name+"_":"日常_")+ymd(new Date())+".csv";
  var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);toast("CSV 已下載");
}

/* ---------- rates ---------- */
function fetchRate(manual){
  if($("fetchRateBtn"))$("fetchRateBtn").textContent="抓取中…";
  return fetch(RATE_API+encodeURIComponent(cfg.base),{cache:"no-store"}).then(function(r){return r.json();}).then(function(j){
    if(j&&j.result==="success"&&j.rates){
      rateMap={};cfg.currencies.forEach(function(c){if(c===cfg.base)rateMap[c]=1;else if(j.rates[c])rateMap[c]=1/j.rates[c];});
      rateOK=true;rateTime=(j.time_last_update_unix?j.time_last_update_unix*1000:Date.now());
      syncRateLabel();renderAll();if(manual)toast("匯率已更新");
    }else throw new Error("bad");
  }).catch(function(){rateOK=false;syncRateLabel();if(manual)toast("抓取失敗，改用手動匯率");}).then(function(){if($("fetchRateBtn"))$("fetchRateBtn").textContent="🔄 抓即時匯率";});
}
function syncRateLabel(){
  var others=cfg.currencies.filter(function(c){return c!==cfg.base;});
  var lbl;
  if(!others.length){lbl="單一幣別 "+cfg.base;}
  else if(rateOK){var d=new Date(rateTime);lbl="即時匯率 🟢 "+others.map(function(c){return "1"+c+"≈"+(rateFor(c)).toFixed(3)+cfg.base;}).join("　")+"<br>來源 exchangerate-api.com · "+(d.getMonth()+1)+"/"+d.getDate();}
  else{lbl="手動匯率 "+others.map(function(c){return "1"+c+"="+rateFor(c)+cfg.base;}).join("　")+"<br>（即時匯率抓取中或離線）";}
  $("rateLabel").innerHTML=lbl;
  if($("rateSrc"))$("rateSrc").innerHTML="目前匯率來源："+(rateOK?"exchangerate-api.com 即時":"手動匯率");
}

/* ---------- 旅程 CRUD ---------- */
function renderTripList(){
  var box=$("tripList");
  if(!cfg.trips||!cfg.trips.length){box.innerHTML="<div class='muted'>還沒有旅程。新增一趟後，頂部就會出現切換鈕。</div>";return;}
  box.innerHTML=cfg.trips.map(function(t){
    var sub=[];if(t.start)sub.push(t.start+(t.end?(" → "+t.end):""));if(t.cur)sub.push("主要 "+t.cur);if(t.budgetTotal)sub.push("預算 "+money(t.budgetTotal));
    return "<div class='triprow'><div><div class='tl'>✈️ "+esc(t.name)+"</div><div class='ts'>"+esc(sub.join("　·　")||"未設定細節")+"</div></div>"+
      "<div class='tb'><button onclick=\"openTripModal('"+t.id+"')\">編輯</button><button class='del' onclick=\"deleteTrip('"+t.id+"')\">刪除</button></div></div>";
  }).join("");
}
function fillCurSelect(sel,val){
  sel.innerHTML=cfg.currencies.map(function(c){return "<option"+(c===val?" selected":"")+">"+esc(c)+"</option>";}).join("");
}
function openTripModal(id){
  tripEditId=id||null;
  var t=id?tripById(id):null;
  $("tripModalTitle").textContent=t?"編輯旅程":"新增旅程";
  $("t-name").value=t?t.name:"";
  $("t-start").value=t&&t.start?t.start:"";
  $("t-end").value=t&&t.end?t.end:"";
  fillCurSelect($("t-cur"),t&&t.cur?t.cur:cfg.currencies[0]);
  $("t-budget").value=t&&t.budgetTotal?t.budgetTotal:"";
  $("t-budget-daily").value=t&&t.budgetDaily?t.budgetDaily:"";
  $("tripDeleteBtn").style.display=t?"block":"none";
  $("tripModal").classList.add("show");$("tripModalBack").classList.add("show");
}
function closeTripModal(){$("tripModal").classList.remove("show");$("tripModalBack").classList.remove("show");}
function saveTripFromModal(){
  var name=$("t-name").value.trim();
  if(!name){toast("請填旅程名稱");return;}
  var rec={
    id:tripEditId||("t"+Date.now()+Math.random().toString(36).slice(2,5)),
    name:name, start:$("t-start").value||"", end:$("t-end").value||"",
    cur:$("t-cur").value||cfg.currencies[0],
    budgetTotal:parseFloat($("t-budget").value)||0,
    budgetDaily:parseFloat($("t-budget-daily").value)||0
  };
  if(!cfg.trips)cfg.trips=[];
  if(tripEditId){var i=cfg.trips.findIndex(function(x){return x.id===tripEditId;});if(i>=0)cfg.trips[i]=rec;}
  else{cfg.trips.push(rec);}
  gas("saveConfig",cfg).catch(syncErr);
  closeTripModal();renderTripList();renderTripBar();
  if(!tripEditId){setActiveTrip(rec.id);switchTab("page-add");toast("旅程已建立，已切換到這趟 ✈️");}
  else{updateModeUI();renderAll();toast("旅程已更新");}
}
function deleteTrip(id){
  var t=tripById(id);if(!t)return;
  var n=state.items.filter(function(r){return (r.trip||"")===id;}).length;
  if(!confirm("刪除旅程「"+t.name+"」？\n（這趟的 "+n+" 筆帳不會被刪除，只是會回到沒有旅程歸屬的狀態）"))return;
  cfg.trips=cfg.trips.filter(function(x){return x.id!==id;});
  gas("saveConfig",cfg).catch(syncErr);
  if(activeTrip===id)setActiveTrip("");
  closeTripModal();renderTripList();renderTripBar();renderAll();toast("旅程已刪除");
}

/* ---------- settings ---------- */
function syncSettingsUI(){
  $("set-people").value=cfg.people.join(",");
  $("set-base").value=cfg.base;
  $("set-curs").value=cfg.currencies.join(",");
  $("set-manual").value=Object.keys(cfg.manualRates||{}).map(function(k){return k+"="+cfg.manualRates[k];}).join("\n");
  $("set-cats").value=cfg.categories.join(",");
  $("set-methods").value=cfg.methods.join(",");
  $("set-budget").value=cfg.budgetTotal||"";
  $("set-budget-daily").value=cfg.budgetDaily||"";
  $("set-quick").value=(cfg.quickItems||[]).join("\n");
  if($("set-apiurl"))$("set-apiurl").value=API_URL;
  $("syncNote").textContent=USE_GAS?"☁️ 已連雲端（Google Sheet），這台裝置會同步到你的 Sheet。":"📴 還沒連雲端：在上面貼你自己的 /exec 網址、按「連結雲端」。在這之前資料只存在這台瀏覽器。";
  renderTripList();
  syncRateLabel();
}
function saveApiUrl(){
  var u=($("set-apiurl").value||"").trim();
  if(u&&!/^https:\/\/script\.google\.com\/.*\/exec$/.test(u)){toast("網址格式怪怪的，應該是 https://script.google.com/.../exec");return;}
  localStorage.setItem("genledger_apiurl",u);
  API_URL=u;USE_GAS=!!u;
  toast(u?"已連結雲端，重新載入中…":"已清除雲端連結");
  boot();
}
function splitCsv(s){return (s||"").split(/[,，]/).map(function(x){return x.trim();}).filter(Boolean);}
function saveSettingsFromUI(){
  var ppl=splitCsv($("set-people").value);if(ppl.length<2){toast("付款人需要兩個名字");return;}
  cfg.people=[ppl[0],ppl[1]];
  cfg.base=($("set-base").value.trim()||"TWD").toUpperCase();
  var curs=splitCsv($("set-curs").value).map(function(c){return c.toUpperCase();});
  if(curs.indexOf(cfg.base)<0)curs.unshift(cfg.base);
  cfg.currencies=curs;
  var mr={};$("set-manual").value.split("\n").forEach(function(line){var m=line.split(/[=:]/);if(m.length>=2&&m[0].trim()){mr[m[0].trim().toUpperCase()]=+m[1].trim()||0;}});cfg.manualRates=mr;
  cfg.categories=splitCsv($("set-cats").value);if(!cfg.categories.length)cfg.categories=DEF.categories.slice();
  cfg.methods=splitCsv($("set-methods").value);if(!cfg.methods.length)cfg.methods=DEF.methods.slice();
  cfg.budgetTotal=parseFloat($("set-budget").value)||0;
  cfg.budgetDaily=parseFloat($("set-budget-daily").value)||0;
  cfg.quickItems=$("set-quick").value.split("\n").map(function(s){return s.trim();}).filter(Boolean);
  gas("saveConfig",cfg).catch(syncErr);
  renderFormSegs();populateFilters();clearForm();syncSettingsUI();fetchRate(false);renderAll();toast("設定已儲存");
}

/* ---------- tabs / render ---------- */
function switchTab(id){var ps=document.querySelectorAll(".page");for(var i=0;i<ps.length;i++)ps[i].classList.toggle("on",ps[i].id===id);var bs=document.querySelectorAll(".tabbar button");for(var j=0;j<bs.length;j++)bs[j].classList.toggle("on",bs[j].getAttribute("data-tab")===id);window.scrollTo(0,0);}
function renderAll(){populateFilters();renderList();renderSummary();renderCats();renderPayers();renderMethods();renderBudget();renderQuickChips();}

/* ---------- init ---------- */
function applyConfig(loaded){
  if(loaded&&typeof loaded==="object"){Object.keys(DEF).forEach(function(k){if(loaded[k]!==undefined&&loaded[k]!==null&&loaded[k]!=="")cfg[k]=loaded[k];});}
  if(!cfg.currencies||!cfg.currencies.length)cfg.currencies=[cfg.base];
  if(cfg.currencies.indexOf(cfg.base)<0)cfg.currencies.unshift(cfg.base);
  if(!Array.isArray(cfg.trips))cfg.trips=[];
  if(activeTrip&&!tripById(activeTrip)){activeTrip="";localStorage.setItem("genledger_activeTrip","");}
}
function boot(){
  gas("getData").then(function(d){
    applyConfig(d&&d.config);
    state.items=(d&&d.items)?d.items.map(function(r){r.amount=+r.amount;r.base=+r.base;r.rateUsed=+r.rateUsed;
      r.date=normDate(r.date);r.trip=r.trip||"";r.day=r.day||"";
      if(typeof r.receipts==="string"){try{r.receipts=r.receipts?JSON.parse(r.receipts):[];}catch(e){r.receipts=[];}}
      if(!r.receipts)r.receipts=[];return r;}):[];
    renderFormSegs();renderTripBar();updateModeUI();syncSettingsUI();clearForm();renderAll();fetchRate(false);
  }).catch(function(){applyConfig(null);renderFormSegs();renderTripBar();updateModeUI();syncSettingsUI();clearForm();renderAll();toast("讀取資料失敗");});
}
function init(){
  bindSeg("seg-cur",updateAmtCalc);bindSeg("seg-payer");bindSeg("seg-method");bindSeg("seg-cat");bindSeg("seg-kind");bindSeg("seg-day");
  $("f-amountField").addEventListener("click",openKeypad);
  $("kpBackdrop").addEventListener("click",closeKeypad);
  $("keypad").addEventListener("click",function(e){var b=e.target.closest("button[data-k]");if(b)keyPress(b.getAttribute("data-k"));});
  $("quickChips").addEventListener("click",function(e){var b=e.target.closest("button[data-i]");if(b)applyQuick(+b.getAttribute("data-i"));});
  $("addPhotoBtn").addEventListener("click",function(){$("f-photo").click();});
  $("f-photo").addEventListener("change",function(e){if(e.target.files&&e.target.files.length)onPhotoPick(e.target.files);e.target.value="";});
  $("saveBtn").addEventListener("click",saveEntry);
  $("cancelEditBtn").addEventListener("click",clearForm);
  $("deleteEntryBtn").addEventListener("click",function(){if(state.editId){delEntry(state.editId);clearForm();}});
  $("copyBtn").addEventListener("click",copyTSV);
  $("csvBtn").addEventListener("click",downloadCSV);
  $("saveSetBtn").addEventListener("click",saveSettingsFromUI);
  $("fetchRateBtn").addEventListener("click",function(){fetchRate(true);});
  $("reloadBtn").addEventListener("click",boot);
  $("saveApiBtn").addEventListener("click",saveApiUrl);
  $("incPersonal").addEventListener("change",function(){includePersonal=this.checked;renderSummary();});
  ["flt-cat","flt-payer","flt-kind","flt-day"].forEach(function(id){$(id).addEventListener("change",renderList);});
  $("f-date").addEventListener("change",function(){var t=activeTripObj();if(t){var ad=autoDay($("f-date").value,t);if(ad)setSeg("seg-day",ad);}syncDateQuick();});
  $("dateQuick").addEventListener("click",function(e){var b=e.target.closest("button[data-d]");if(!b)return;$("f-date").value=shiftYmd(+b.getAttribute("data-d"));var t=activeTripObj();if(t){var ad=autoDay($("f-date").value,t);if(ad)setSeg("seg-day",ad);}syncDateQuick();});
  $("lmPrev").addEventListener("click",function(){lmShift(-1);});
  $("lmNext").addEventListener("click",function(){lmShift(1);});
  /* trip bar */
  $("tripBar").addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;if(b.getAttribute("data-add")){openTripModal(null);return;}setActiveTrip(b.getAttribute("data-t"));});
  $("addTripBtn").addEventListener("click",function(){openTripModal(null);});
  $("tripSaveBtn").addEventListener("click",saveTripFromModal);
  $("tripCancelBtn").addEventListener("click",closeTripModal);
  $("tripModalBack").addEventListener("click",closeTripModal);
  $("tripDeleteBtn").addEventListener("click",function(){if(tripEditId)deleteTrip(tripEditId);});
  var tb=document.querySelectorAll(".tabbar button");for(var i=0;i<tb.length;i++)tb[i].addEventListener("click",function(){switchTab(this.getAttribute("data-tab"));});
  /* 先用預設值把畫面立刻畫好（避免載入時的空白閃爍），雲端資料回來後 boot 會再刷新一次 */
  renderFormSegs();renderTripBar();updateModeUI();clearForm();renderAll();
  boot();
}
init();
</script>
